{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-8">
        <div class="card auth-card">
            <div class="card-header">
                <h3 class="mb-0">✈️ Создать новый маршрут</h3>
                <p class="mb-0 mt-2 text-white-50">Поделись своим путешествием</p>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Создать маршрут</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

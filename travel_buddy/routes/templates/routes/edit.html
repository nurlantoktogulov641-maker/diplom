{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-warning"><h3>Редактировать маршрут</h3></div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-warning">Сохранить</button>
                <a href="{% url 'route_detail' route.id %}" class="btn btn-secondary">Назад</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

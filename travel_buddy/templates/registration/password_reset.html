{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header"><h3>Восстановление пароля</h3></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <input type="email" name="email" class="form-control mb-3" placeholder="Ваш email" required>
                    <button type="submit" class="btn btn-primary w-100">Отправить</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

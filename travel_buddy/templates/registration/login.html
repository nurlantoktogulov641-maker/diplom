{% extends 'base.html' %}

{% block title %}Вход - Travel Buddy{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header text-center">
                <h3 class="mb-0">🔑 Вход</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" name="username" class="form-control" placeholder="Введите имя" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                    <div class="text-center mt-2">
                        <a href="{% url 'password_reset' %}">Забыли пароль?</a>
                    </div>
                </form>
                <hr>
                <p class="text-center mb-0">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
                
                <!-- Кнопки входа через соцсети -->
                <hr>
                <div class="text-center">
                    <p class="mb-2">Или войдите через:</p>
                    <div class="d-flex justify-content-center gap-2 flex-wrap">
                        <a href="/accounts/google/login/" class="btn btn-outline-danger">Google</a>
                        <a href="/accounts/vk/login/" class="btn btn-outline-primary">VK</a>
                        <a href="/accounts/telegram/login/" class="btn btn-outline-info">Telegram</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning"><h3>Редактирование профиля</h3></div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="text-center">
                        {% if profile_user.avatar %}
                            <img src="{{ profile_user.avatar.url }}" style="width:100px;height:100px;border-radius:50%;">
                        {% endif %}
                        <input type="file" name="avatar" class="form-control mt-2">
                    </div>
                    <div class="mb-3 mt-3"><label class="form-label">О себе</label><textarea name="bio" class="form-control" rows="4">{{ profile_user.bio }}</textarea></div>
                    <div class="mb-3"><label class="form-label">Интересы</label><textarea name="interests" class="form-control" rows="3">{{ profile_user.interests }}</textarea></div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'profile' profile_user.id %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
